name: Domain-Recherche

on:
  issues:
    types: [opened, labeled]
  workflow_dispatch:
    inputs:
      issue:
        description: 'Issue-Nummer, die recherchiert werden soll'
        required: true

permissions:
  issues: write
  contents: read

jobs:
  research:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.issue.labels.*.name, 'unbekannte-domain')
    runs-on: ubuntu-latest
    env:
      ISSUE_NR: ${{ github.event_name == 'workflow_dispatch' && inputs.issue || github.event.issue.number }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Issue-Text laden (bei manuellem Start)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue view "$ISSUE_NR" --repo ${{ github.repository }} --json title,body --jq '.title + "\n" + .body' > issue_text.txt
      - name: Issue-Text ablegen (bei Issue-Event)
        if: github.event_name != 'workflow_dispatch'
        env:
          # Indirektion über env schützt vor Shell-Injection aus Issue-Texten;
          # der grep unten lässt ohnehin nur [a-z0-9.-]-Domains durch.
          ISSUE_TEXT: |
            ${{ github.event.issue.title }}
            ${{ github.event.issue.body }}
        run: printf '%s' "$ISSUE_TEXT" > issue_text.txt
      - name: Domains ziehen und recherchieren
        run: |
          ISSUE_TEXT=$(cat issue_text.txt)
          DOMAINS=$(printf '%s' "$ISSUE_TEXT" \
            | grep -oiE '\b([a-z0-9][a-z0-9-]*\.)+[a-z]{2,}\b' \
            | tr 'A-Z' 'a-z' \
            | grep -viE '(^|\.)github\.com$|(^|\.)githubusercontent\.com$|(^|\.)beispiel-domain\.com$' \
            | sort -u | head -10)
          if [ -z "$DOMAINS" ]; then
            printf 'Im Issue wurden keine Domains gefunden — bitte Domain im Format `beispiel.com` angeben.\n' > recherche.md
          else
            {
              echo '## Automatische Recherche (`tools/research_domain.js`)'
              echo
              echo '```'
              node tools/research_domain.js $DOMAINS 2>&1 | head -300
              echo '```'
              echo
              echo '_Bitte Belege prüfen, Kategorie wählen und den Eintrag in `src/common/trackerdb.js` ergänzen (siehe README, „Wie die Datenbank wächst")._'
            } > recherche.md
          fi
      - name: Ergebnis als Kommentar posten
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "$ISSUE_NR" --repo ${{ github.repository }} --body-file recherche.md
